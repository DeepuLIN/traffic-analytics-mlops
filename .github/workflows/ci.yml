name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 📥 Checkout code
    - name: Checkout code
      uses: actions/checkout@v4

    # 🐍 Setup Python
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # ⚡ Cache pip (BIG SPEED BOOST)
    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    # 📦 Install dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --no-cache-dir -r requirements-ci.txt

    # 🧠 Set PYTHONPATH
    - name: Set PYTHONPATH
      run: echo "PYTHONPATH=$PWD" >> $GITHUB_ENV

    # 🧪 Run tests
    - name: Run tests
      run: PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest

    # 🚀 FastAPI import check (NON-BLOCKING)
    - name: Check FastAPI app loads
      run: |
        python -c "from src.api.main import app; print('✅ FastAPI app loaded successfully')"
